version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bobobeads-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: bobobeads
      MYSQL_CHARSET: utf8mb4
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:latest
    container_name: bobobeads-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
