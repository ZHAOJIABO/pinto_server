server:
  name: bobobeads-server
  mode: local
  grpc_port: 9090
  http_port: 8080

mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  password: ""
  dbname: bobobeads

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0

oss:
  # 阿里云 OSS：北京地域 pinto-test Bucket。密钥只放在 server.local.yaml。
  endpoint: https://oss-cn-beijing.aliyuncs.com
  region: cn-beijing
  bucket: pinto-test
  # OSS CNAME 域名只用于 DNS 自定义域名绑定，不能直接访问。
  # 未配置自定义域名前，使用标准 Bucket 外网域名。
  public_base_url: https://pinto-test.oss-cn-beijing.aliyuncs.com
  access_key_id: ""
  access_key_secret: ""



jwt:
  secret: "change-me-in-production"
  access_expire_h: 72
  refresh_expire_h: 720

sms:
  secret_id: ""
  secret_key: ""
  app_id: ""
  sign_name: "拼豆"
  template_id: ""

wechat:
  app_id: ""
  app_secret: ""
  mp_app_id: ""
  mp_secret: ""

apple:
  team_id: ""
  client_id: ""
  key_id: ""
  key_file: ""

log:
  level: debug
  path: ./logs
  max_size: 100
  max_age: 7

payment:
  wechat_pay:
    mch_id: ""
    api_key: ""
    cert_file: ""
    key_file: ""
    notify_url: ""

generation:
  daily_free_limit: 3
  credit_cost: 1
  expire_minutes: 30

pattern:
  max_width: 200
  max_height: 200
  max_pixels: 40000
  max_colors: 221

ai_generation:
  task_expire_minutes: 30
  worker_interval: 30
  fake_provider: true
  provider_name: "fake"

# Flutter Web 管理后台。密码必须是 PBKDF2-SHA256 哈希，不能填写明文；
# 生产环境请通过独立的未提交配置或密钥管理系统注入 jwt_secret 和 accounts。
admin:
  jwt_secret: ""
  access_expire_m: 480
  accounts: []
