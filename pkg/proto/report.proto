syntax = "proto3";

package bobobeads.v1;

option go_package = "github.com/zhaojiabo/bobobeads_server/internal/pb";

import "common.proto";
import "google/api/annotations.proto";

service ReportService {
  rpc ReportEvent(ReportEventRequest) returns (ReportEventResponse) {
    option (google.api.http) = {
      post: "/api/v1/report/event"
      body: "*"
    };
  }

  rpc ReportError(ReportErrorRequest) returns (ReportErrorResponse) {
    option (google.api.http) = {
      post: "/api/v1/report/error"
      body: "*"
    };
  }

  rpc SubmitFeedback(SubmitFeedbackRequest) returns (SubmitFeedbackResponse) {
    option (google.api.http) = {
      post: "/api/v1/report/feedback"
      body: "*"
    };
  }
}

message EventItem {
  string event_name = 1;
  map<string, string> params = 2;
  int64 timestamp = 3;
}

message ReportEventRequest {
  RequestHeader header = 1;
  repeated EventItem events = 2;
}

message ReportEventResponse {
  ResponseHeader header = 1;
}

message ReportErrorRequest {
  RequestHeader header = 1;
  string error_type = 2;
  string message = 3;
  string stack_trace = 4;
  map<string, string> context = 5;
}

message ReportErrorResponse {
  ResponseHeader header = 1;
}

message SubmitFeedbackRequest {
  RequestHeader header = 1;
  string content = 2;
  string contact = 3;
  repeated string image_urls = 4;
}

message SubmitFeedbackResponse {
  ResponseHeader header = 1;
}
